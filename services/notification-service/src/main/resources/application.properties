quarkus.application.name=notification-service
quarkus.http.port=8084

# Kafka consumers
mp.messaging.incoming.payment-notifications-in.connector=smallrye-kafka
mp.messaging.incoming.payment-notifications-in.topic=payment-notifications
mp.messaging.incoming.payment-notifications-in.group.id=notification-service
mp.messaging.incoming.payment-notifications-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-notifications-in.auto.offset.reset=earliest

mp.messaging.incoming.fraud-alerts-notifications.connector=smallrye-kafka
mp.messaging.incoming.fraud-alerts-notifications.topic=fraud-alerts
mp.messaging.incoming.fraud-alerts-notifications.group.id=notification-fraud
mp.messaging.incoming.fraud-alerts-notifications.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

kafka.bootstrap.servers=kafka:29092

# Email (Quarkus Mailer)
quarkus.mailer.host=smtp.sendgrid.net
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=apikey
quarkus.mailer.password=${SENDGRID_API_KEY:}
quarkus.mailer.from=noreply@payment.chaos

# SMS (Twilio)
notification.sms.enabled=${NOTIFICATION_SMS_ENABLED:false}
notification.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.twilio.from-number=${TWILIO_FROM_NUMBER:}

# Email
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
notification.email.from=noreply@payment.chaos

# Push (AWS SNS)
notification.push.enabled=${NOTIFICATION_PUSH_ENABLED:false}
notification.sns.topic-arn=${SNS_TOPIC_ARN:}

# AWS SNS
quarkus.sns.aws.region=us-east-1
quarkus.sns.aws.credentials.type=default

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

quarkus.log.level=INFO
quarkus.log.category."com.chaos.payment".level=DEBUG

%test.kafka.bootstrap.servers=localhost:9092
%dev.kafka.bootstrap.servers=localhost:29092
%dev.quarkus.mailer.mock=true
