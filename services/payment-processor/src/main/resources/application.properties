quarkus.application.name=payment-processor
quarkus.http.port=8081

# Kafka
mp.messaging.incoming.payment-commands.connector=smallrye-kafka
mp.messaging.incoming.payment-commands.topic=payment-commands
mp.messaging.incoming.payment-commands.group.id=payment-processor
mp.messaging.incoming.payment-commands.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.payment-commands.auto.offset.reset=earliest

mp.messaging.incoming.payment-retry.connector=smallrye-kafka
mp.messaging.incoming.payment-retry.topic=payment-retry
mp.messaging.incoming.payment-retry.group.id=payment-processor-retry
mp.messaging.incoming.payment-retry.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.payment-events.connector=smallrye-kafka
mp.messaging.outgoing.payment-events.topic=payment-events
mp.messaging.outgoing.payment-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer

kafka.bootstrap.servers=kafka:29092

# Circuit breaker
quarkus.fault-tolerance.global.circuit-breaker.request-volume-threshold=10
quarkus.fault-tolerance.global.circuit-breaker.failure-ratio=0.5
quarkus.fault-tolerance.global.circuit-breaker.delay=5000

# Payment providers
payment.provider.orange.url=https://api.orange.com/orange-money-webpay/dev/v1
payment.provider.moov.url=https://api.moov.africa/v1
payment.provider.mtn.url=https://sandbox.momodeveloper.mtn.com
payment.provider.wave.url=https://api.wave.com/v1
payment.provider.airtel.url=https://openapiuat.airtel.africa
payment.provider.mpesa.url=https://sandbox.safaricom.co.ke
payment.provider.visa.url=https://sandbox.api.visa.com
payment.provider.mastercard.url=https://sandbox.api.mastercard.com
payment.provider.btc.url=https://testnet.demo.btcpayserver.org
payment.provider.bceao.url=https://api.bceao.int/v1

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.chaos.payment".level=DEBUG

%test.kafka.bootstrap.servers=localhost:9092
%dev.kafka.bootstrap.servers=localhost:29092
