    # ============================================
    # Application Configuration
    # ============================================
    quarkus.application.name=payment-gateway
    quarkus.application.version=1.0.0

    # ============================================
    # HTTP Configuration
    # ============================================
    quarkus.http.port=8080
    quarkus.http.root-path=/
    quarkus.http.cors=true
    quarkus.http.cors.origins=*
    quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
    quarkus.http.cors.headers=Content-Type,Authorization,X-Correlation-ID
    quarkus.http.limits.max-body-size=1M
    quarkus.http.read-timeout=30S

    # ============================================
    # DynamoDB Configuration
    # ============================================
    quarkus.dynamodb.endpoint-override=http://dynamodb-local:8000
    quarkus.dynamodb.aws.region=us-east-1
    quarkus.dynamodb.aws.credentials.type=static
    quarkus.dynamodb.aws.credentials.static-provider.access-key-id=test
    quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=test
    dynamodb.event-store.table=PaymentEventStore
    dynamodb.payments.table=PaymentTransactions

    # ============================================
    # Kafka Configuration
    # ============================================
    kafka.bootstrap.servers=kafka:29092

    # Topics
    mp.messaging.outgoing.payment-events.connector=smallrye-kafka
    mp.messaging.outgoing.payment-events.topic=payment-events
    mp.messaging.outgoing.payment-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer
    mp.messaging.outgoing.payment-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
    mp.messaging.outgoing.payment-events.max.block.ms=5000

    mp.messaging.outgoing.payment-commands.connector=smallrye-kafka
    mp.messaging.outgoing.payment-commands.topic=payment-commands
    mp.messaging.outgoing.payment-commands.key.serializer=org.apache.kafka.common.serialization.StringSerializer
    mp.messaging.outgoing.payment-commands.value.serializer=org.apache.kafka.common.serialization.StringSerializer

    mp.messaging.outgoing.chaos-events.connector=smallrye-kafka
    mp.messaging.outgoing.chaos-events.topic=chaos-events
    mp.messaging.outgoing.chaos-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer

    mp.messaging.outgoing.fraud-alerts.connector=smallrye-kafka
    mp.messaging.outgoing.fraud-alerts.topic=fraud-alerts
    mp.messaging.outgoing.fraud-alerts.value.serializer=org.apache.kafka.common.serialization.StringSerializer

    mp.messaging.outgoing.payment-notifications.connector=smallrye-kafka
    mp.messaging.outgoing.payment-notifications.topic=payment-notifications
    mp.messaging.outgoing.payment-notifications.value.serializer=org.apache.kafka.common.serialization.StringSerializer

    mp.messaging.incoming.payment-retry-queue.connector=smallrye-rabbitmq
    mp.messaging.incoming.payment-retry-queue.queue.name=payment-retry
    mp.messaging.incoming.chaos-notifications.connector=smallrye-rabbitmq
    mp.messaging.incoming.chaos-notifications.queue.name=chaos-notifications
    mp.messaging.incoming.payment-events-consumer.connector=smallrye-kafka
    mp.messaging.incoming.payment-events-consumer.topic=payment-events
    mp.messaging.incoming.payment-events-consumer.group.id=payment-query-consumer

    # ============================================
    # RabbitMQ Configuration
    # ============================================
    rabbitmq-host=rabbitmq
    rabbitmq-port=5672
    rabbitmq-username=payment
    rabbitmq-password=payment_secret
    rabbitmq-virtual-host=payment-vhost

    # ============================================
    # Fault Tolerance Configuration
    # ============================================
    # Circuit Breaker
    org.eclipse.microprofile.faulttolerance.CircuitBreaker.requestVolumeThreshold=10
    org.eclipse.microprofile.faulttolerance.CircuitBreaker.failureRatio=0.5
    org.eclipse.microprofile.faulttolerance.CircuitBreaker.delay=5000

    # Retry
    org.eclipse.microprofile.faulttolerance.Retry.maxRetries=3
    org.eclipse.microprofile.faulttolerance.Retry.delay=1000

    # Timeout
    org.eclipse.microprofile.faulttolerance.Timeout.value=25000

    # ============================================
    # Metrics Configuration
    # ============================================
    quarkus.micrometer.enabled=true
    quarkus.micrometer.registry-enabled-default=true
    quarkus.micrometer.binder.http-server.enabled=true
    quarkus.micrometer.binder.kafka.enabled=true
    quarkus.micrometer.export.prometheus.enabled=true
    quarkus.micrometer.export.prometheus.path=/q/metrics

    # ============================================
    # Logging Configuration
    # ============================================
    quarkus.log.level=INFO
    quarkus.log.category."com.chaos.payment".level=DEBUG
    quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] [TxId=%X{transactionId}] [Chaos=%X{chaosActive}] (%t) %s%e%n
    quarkus.log.console.json=true

    # Logstash/ELK Handler
    quarkus.log.handler.socket.logstash.level=INFO
    quarkus.log.handler.socket.logstash.host=logstash
    quarkus.log.handler.socket.logstash.port=5000

    # ============================================
    # OpenAPI & Swagger UI
    # ============================================
    quarkus.smallrye-openapi.path=/q/openapi
    quarkus.swagger-ui.always-include=true
    quarkus.swagger-ui.path=/q/swagger-ui

    # ============================================
    # Health Check Configuration
    # ============================================
    quarkus.health.openapi.included=true
    quarkus.smallrye-health.root-path=/q/health
    quarkus.smallrye-health.ui.root-path=/q/health-ui

    # ============================================
    # Chaos Engineering Configuration
    # ============================================
    chaos.enabled=false
    chaos.failure-rate=0.1
    chaos.latency.min-ms=100
    chaos.latency.max-ms=5000
    chaos.scenarios=LATENCY,ERROR,THROTTLE

    # ============================================
    # Payment Providers Configuration
    # ============================================
    # Orange Money
    payment.provider.orange.base-url=https://api.orange.com/orange-money-webpay
    payment.provider.orange.timeout=15000
    payment.provider.orange.circuit-breaker.enabled=true

    # MTN Mobile Money
    payment.provider.mtn.base-url=https://sandbox.momodeveloper.mtn.com
    payment.provider.mtn.timeout=20000
    payment.provider.mtn.circuit-breaker.enabled=true

    # Wave
    payment.provider.wave.base-url=https://api.wave.com
    payment.provider.wave.timeout=15000

    # M-Pesa
    payment.provider.mpesa.base-url=https://sandbox.safaricom.co.ke
    payment.provider.mpesa.timeout=20000

    # Moov
    payment.provider.moov.base-url=https://api.moov.africa
    payment.provider.moov.timeout=15000

    # Airtel Money
    payment.provider.airtel.base-url=https://openapi.airtel.africa
    payment.provider.airtel.timeout=15000

    # Visa
    payment.provider.visa.base-url=https://sandbox.api.visa.com
    payment.provider.visa.timeout=10000

    # Mastercard
    payment.provider.mastercard.base-url=https://sandbox.api.mastercard.com
    payment.provider.mastercard.timeout=10000

    # Bitcoin (BTCPay Server)
    payment.provider.btc.base-url=https://btcpay.example.com
    payment.provider.btc.timeout=30000

    # BCEAO PI/SPI
    payment.provider.bceao.base-url=https://api.bceao.int
    payment.provider.bceao.timeout=15000

    # ============================================
    # AWS Configuration (Free Tier)
    # ============================================
    quarkus.lambda.handler=payment-gateway-handler
    aws.region=us-east-1
    aws.dynamodb.table-name=PaymentTransactions

    # ============================================
    # Native Image Configuration
    # ============================================
    quarkus.native.additional-build-args=\
    --initialize-at-run-time=com.chaos.payment.infrastructure.chaos.ChaosMonkey,\
    -H:ReflectionConfigurationFiles=reflection-config.json

    # ============================================
    # Profiles
    # ============================================
    # Chaos Testing Profile
    %chaos-testing.chaos.enabled=true
    %chaos-testing.chaos.failure-rate=0.15
    %chaos-testing.quarkus.log.level=DEBUG

    # Production Profile
    %prod.chaos.enabled=false
    %prod.quarkus.log.level=WARN
    %prod.dynamodb.endpoint-override=

    # Test Profile
    %test.chaos.enabled=false
    %test.quarkus.dynamodb.endpoint-override=http://localhost:8000
    %test.kafka.bootstrap.servers=localhost:9092
    %test.quarkus.oidc.enabled=false
    %test.quarkus.security.auth.enabled-in-dev-mode=false

    # Dev Profile
    %dev.quarkus.oidc.enabled=false
    %dev.quarkus.security.auth.enabled-in-dev-mode=false
    %dev.quarkus.dynamodb.endpoint-override=http://localhost:8000
    %dev.kafka.bootstrap.servers=localhost:9092