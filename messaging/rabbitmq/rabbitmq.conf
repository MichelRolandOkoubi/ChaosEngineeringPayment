# ============================================================
# RabbitMQ Configuration — Payment Chaos Engineering
# ============================================================

# ----- Network -----
listeners.tcp.default = 5672
management.tcp.port   = 15672

# ----- Default credentials (override in prod via secrets) -----
default_user     = payment
default_pass     = payment_secret
default_vhost    = payment

# ----- Memory & Disk thresholds -----
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative           = 1.5

# ----- Message persistence -----
queue_index_embed_msgs_below = 4096

# ----- Heartbeat -----
heartbeat = 60

# ----- Logging -----
log.console      = true
log.console.level = info
log.file         = false

# ----- Management plugin -----
management.load_definitions = /etc/rabbitmq/definitions.json
