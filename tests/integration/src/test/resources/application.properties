# ============================================================
# Test profile configuration for integration tests
# ============================================================
quarkus.test.profile=integration

# Disable OIDC — integration tests mock auth
quarkus.oidc.enabled=false
quarkus.security.auth.enabled-in-dev-mode=false

# DynamoDB — points to LocalStack (started by Testcontainers)
quarkus.dynamodb.endpoint-override=${dynamodb.url:http://localhost:4566}
quarkus.dynamodb.aws.region=us-east-1
quarkus.dynamodb.aws.credentials.type=static
quarkus.dynamodb.aws.credentials.static-provider.access-key-id=test
quarkus.dynamodb.aws.credentials.static-provider.secret-access-key=test

# Messaging — in-memory connectors (Testcontainers Kafka started per-test when needed)
mp.messaging.outgoing.payment-events.connector=smallrye-in-memory
mp.messaging.outgoing.payment-commands.connector=smallrye-in-memory
mp.messaging.outgoing.chaos-events.connector=smallrye-in-memory
mp.messaging.outgoing.fraud-alerts.connector=smallrye-in-memory
mp.messaging.outgoing.payment-notifications.connector=smallrye-in-memory
mp.messaging.incoming.payment-retry-queue.connector=smallrye-in-memory
mp.messaging.incoming.chaos-notifications.connector=smallrye-in-memory
mp.messaging.incoming.payment-events-consumer.connector=smallrye-in-memory

# RabbitMQ — no broker in base config (enabled per test when needed)
quarkus.rabbitmq.host=localhost
quarkus.rabbitmq.port=5672

# Chaos — disabled during integration tests
chaos.enabled=false

# HTTP port
quarkus.http.port=8080
quarkus.http.test-port=8080

# Disable DevServices (Testcontainers started manually in tests)
quarkus.devservices.enabled=false
quarkus.kafka.devservices.enabled=false
quarkus.dynamodb.devservices.enabled=false

# Logging
quarkus.log.level=WARN
quarkus.log.category."com.chaos.payment".level=INFO

# Micrometer — keep MeterRegistry bean available, disable Prometheus export
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=false

# OpenTelemetry — no OTLP collector in tests; disable export to avoid
# repeated "Connection refused: localhost:4317" errors slowing the suite
quarkus.otel.sdk.disabled=true
quarkus.otel.traces.exporter=none
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none
