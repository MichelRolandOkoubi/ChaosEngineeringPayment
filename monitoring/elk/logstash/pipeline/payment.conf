    input {
    # Kafka input for payment events
    kafka {
        bootstrap_servers => "kafka:9092"
        topics => ["payment-events", "chaos-events", "fraud-alerts"]
        group_id => "logstash-payment-consumer"
        consumer_threads => 3
        codec => "json"
        type => "payment-kafka"
    }
    
    # File input for service logs
    beats {
        port => 5044
        type => "payment-logs"
    }
    
    # TCP input for structured logs
    tcp {
        port => 5000
        codec => json_lines
        type => "payment-structured"
    }
    }

    filter {
    if [type] == "payment-kafka" {
        # Parse payment event
        json {
        source => "message"
        target => "event"
        }
        
        # Add metadata
        mutate {
        add_field => {
            "[@metadata][index]" => "payment-events"
            "source" => "kafka"
        }
        }
        
        # Parse timestamp
        date {
        match => ["[event][occurredAt]", "ISO8601"]
        target => "@timestamp"
        }
        
        # Tag chaos events
        if [event][chaosInjected] == true {
        mutate {
            add_tag => ["chaos", "chaos-event"]
            add_field => {
            "chaos_scenario" => "%{[event][chaosScenario]}"
            }
        }
        }
        
        # Provider routing
        if [event][providerId] {
        mutate {
            add_field => {
            "payment_provider" => "%{[event][providerId]}"
            }
        }
        }
        
        # Anomaly detection
        if [event][status] == "FAILED" {
        mutate {
            add_tag => ["payment-failure"]
        }
        }
    }
    
    if [type] == "payment-logs" {
        # Parse Quarkus logs
        grok {
        match => {
            "message" => [
            "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} \[%{NOTSPACE:logger}\] \(%{NOTSPACE:thread}\) %{GREEDYDATA:log_message}",
            "%{GREEDYDATA:log_message}"
            ]
        }
        }
        
        # Extract transaction ID from logs
        grok {
        match => {
            "log_message" => "transactionId[=:]%{UUID:transaction_id}"
        }
        tag_on_failure => []
        }
        
        # Tag chaos logs
        if "CHAOS" in [log_message] {
        mutate {
            add_tag => ["chaos", "chaos-log"]
        }
        }
        
        mutate {
        add_field => {
            "[@metadata][index]" => "payment-logs"
        }
        }
    }
    
    # Geo-IP enrichment
    if [client_ip] {
        geoip {
        source => "client_ip"
        target => "geo"
        }
    }
    
    # Remove unwanted fields
    mutate {
        remove_field => ["host", "beat", "offset"]
    }
    }

    output {
    if [type] == "payment-kafka" {
        elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "payment-events-%{+YYYY.MM.dd}"
        template_name => "payment-events"
        template_overwrite => true
        }
    }
    
    if [type] == "payment-logs" {
        elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "payment-logs-%{+YYYY.MM.dd}"
        }
    }
    
    # Chaos events to dedicated index
    if "chaos" in [tags] {
        elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "chaos-events-%{+YYYY.MM.dd}"
        }
    }
    
    # Debug output
    if [@metadata][debug] {
        stdout {
        codec => rubydebug
        }
    }
    }