  groups:
    - name: payment_alerts
      rules:
        # High Error Rate Alert
        - alert: PaymentHighErrorRate
          expr: |
            rate(payment_error_total[5m]) / 
            rate(payment_initiate_count_total[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
            team: payment
          annotations:
            summary: "High payment error rate detected"
            description: |
              Payment error rate is {{ $value | humanizePercentage }} 
              for provider {{ $labels.provider }}.
              This may indicate chaos engineering is active or a real outage.
            runbook_url: "https://runbook.example.com/payment-errors"

        # Provider Down Alert
        - alert: PaymentProviderDown
          expr: |
            up{job="payment-gateway"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Payment gateway is down"
            description: "Payment gateway instance {{ $labels.instance }} is down"

        # Chaos Engineering Active
        - alert: ChaosEngineeringActive
          expr: |
            chaos_injection_total > 0
          for: 0m
          labels:
            severity: warning
            team: chaos
          annotations:
            summary: "Chaos engineering is actively injecting failures"
            description: |
              Chaos scenario: {{ $labels.scenario }}
              Target: {{ $labels.provider }}
              Total injections: {{ $value }}

        # High Latency Alert
        - alert: PaymentHighLatency
          expr: |
            histogram_quantile(0.99, 
              rate(payment_processing_duration_seconds_bucket[5m])
            ) > 2
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "Payment processing P99 latency > 2 seconds"
            description: |
              P99 latency is {{ $value | humanizeDuration }} 
              for provider {{ $labels.provider }}

        # DynamoDB Throttling
        - alert: DynamoDBThrottling
          expr: |
            rate(aws_dynamodb_throttled_requests_total[5m]) > 10
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "DynamoDB is being throttled"
            description: "DynamoDB throttling rate: {{ $value }} rps"

        # Kafka Consumer Lag
        - alert: KafkaConsumerLag
          expr: |
            kafka_consumer_lag_sum > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Kafka consumer lag is high"
            description: |
              Consumer group {{ $labels.consumergroup }} 
              lag: {{ $value }} messages

        # Multi-Region Failover
        - alert: RegionFailover
          expr: |
            chaos_region_failure_total > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Region failover has been triggered"
            description: "Region {{ $labels.region }} failover triggered"

        # Dead Letter Queue Growth
        - alert: DLQGrowth
          expr: |
            rate(aws_sqs_approximate_number_of_messages_visible[5m]) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Dead Letter Queue is growing"
            description: "DLQ has {{ $value }} messages"

        # Circuit Breaker Open
        - alert: CircuitBreakerOpen
          expr: |
            microprofile_ft_circuitbreaker_opened_total > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Circuit breaker is open"
            description: "Circuit breaker for {{ $labels.method }} is open"

    - name: chaos_experiments
      rules:
        # Experiment Success Rate
        - alert: ChaosExperimentFailed
          expr: |
            chaos_experiment_passed_total / 
            (chaos_experiment_passed_total + chaos_experiment_failed_total) < 0.8
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Chaos experiment failure rate is high"
            description: "System not resilient enough under chaos conditions"