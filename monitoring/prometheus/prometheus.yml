  global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
      environment: 'chaos-testing'
      cluster: 'payment-multi-region'

  alerting:
    alertmanagers:
      - static_configs:
          - targets:
              - alertmanager:9093

  rule_files:
    - '/etc/prometheus/rules/*.yml'

  scrape_configs:
    # Payment Gateway Service
    - job_name: 'payment-gateway'
      static_configs:
        - targets: ['payment-gateway:8080']
      metrics_path: '/q/metrics'
      scrape_interval: 10s
      relabel_configs:
        - source_labels: [__address__]
          target_label: instance
        - target_label: service
          replacement: 'payment-gateway'

    # Payment Processor Service
    - job_name: 'payment-processor'
      static_configs:
        - targets: ['payment-processor:8081']
      metrics_path: '/q/metrics'
      scrape_interval: 10s

    # Payment Query Service
    - job_name: 'payment-query'
      static_configs:
        - targets: ['payment-query:8082']
      metrics_path: '/q/metrics'

    # Chaos Monkey Service
    - job_name: 'chaos-monkey'
      static_configs:
        - targets: ['chaos-monkey:8090']
      metrics_path: '/q/metrics'
      scrape_interval: 5s  # More frequent for chaos monitoring

    # Kafka Metrics
    - job_name: 'kafka'
      static_configs:
        - targets: ['kafka-exporter:9308']
      scrape_interval: 15s

    # RabbitMQ Metrics
    - job_name: 'rabbitmq'
      static_configs:
        - targets: ['rabbitmq:15692']
      metrics_path: '/metrics'

    # Node Exporter
    - job_name: 'node-exporter'
      static_configs:
        - targets: ['node-exporter:9100']

    # AWS CloudWatch Metrics (via exporter)
    - job_name: 'cloudwatch'
      static_configs:
        - targets: ['cloudwatch-exporter:9106']